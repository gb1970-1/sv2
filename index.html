<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f1f" />
  <meta name="color-scheme" content="dark" />
  <title>Secret Vibe</title>

  <!-- Open Graph / Share -->
  <meta property="og:title" content="👀 someone you know picked you" />
  <meta property="og:description" content="Hold to reveal your vibe • a playful mystery game" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="sharecard.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />

  <style>
    :root{
      --bg0:#070a14;
      --bg1:#0b0f1f;
      --card:rgba(255,255,255,.07);
      --card2:rgba(255,255,255,.05);
      --stroke:rgba(255,255,255,.12);
      --stroke2:rgba(255,255,255,.18);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.62);
      --muted2:rgba(255,255,255,.42);
      --mint:#35f0c7;
      --gold:#ffd46a;
      --purple:#7a5cff;
      --radius:26px;
      --radius2:18px;
      --shadow: 0 30px 90px rgba(0,0,0,.55);
    }
    *{box-sizing:border-box}
    html,body{height:100%; margin:0}
    body{
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1000px 700px at 15% 30%, rgba(124,76,255,.25), transparent 55%),
        radial-gradient(800px 700px at 85% 25%, rgba(0,255,209,.16), transparent 52%),
        radial-gradient(900px 700px at 55% 80%, rgba(255,210,100,.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow:hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      touch-action: manipulation;
    }

    /* App frame */
    .app{
      height:100%;
      width:100%;
      display:flex;
      justify-content:center;
      align-items:stretch;
    }
    .shell{
      width:min(460px, 100%);
      padding: 14px 14px 18px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    /* Top mini header */
    .top{
      display:flex;
      gap:12px;
      align-items:center;
      padding: 10px 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 22px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
      flex: 0 0 auto;
    }
    .orb{
      width: clamp(52px, 10vw, 64px);
      height: clamp(52px, 10vw, 64px);
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), transparent 45%),
        radial-gradient(circle at 55% 65%, rgba(0,255,209,.18), transparent 55%),
        radial-gradient(circle at 40% 70%, rgba(124,76,255,.22), transparent 55%),
        rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 0 0 1px rgba(124,76,255,.15), 0 18px 60px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
    }
    .eyes{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-45%);
      display:flex;
      gap:7px;
      align-items:center;
      opacity:.95;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.45));
    }
    .eye{
      width: 18px; height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.90);
      position:relative;
    }
    .pupil{
      width: 5px; height: 5px;
      border-radius: 999px;
      background: rgba(15,18,28,.92);
      position:absolute;
      top:50%; left:50%;
      transform:translate(-40%,-45%);
    }
    .topText{min-width:0; flex:1}
    .brand{
      display:flex; align-items:center; gap:8px;
      font-weight:800;
      letter-spacing:-.02em;
      font-size: 15px;
      line-height:1.1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .sub{
      font-size: 12px;
      color: var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-top:2px;
    }
    .pillRow{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .pill{
      background: rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 12px;
      color: rgba(255,255,255,.86);
      display:flex; align-items:center; gap:8px;
      user-select:none;
    }
    .pill .spark{filter: drop-shadow(0 10px 20px rgba(255,210,100,.25))}
    .iconBtn{
      width: 36px; height: 36px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.88);
      display:grid;
      place-items:center;
      user-select:none;
    }
    .iconBtn:active{transform: scale(.98);}

    /* Main card */
    .card{
      flex: 1 1 auto;
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.05));
      border: 1px solid rgba(255,255,255,.11);
      border-radius: var(--radius);
      padding: 18px 16px 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display:flex;
      flex-direction:column;
      gap: 12px;
      overflow:hidden;
      min-height: 0;
    }
    .title{
      text-align:center;
      font-weight: 900;
      letter-spacing: -.03em;
      font-size: clamp(22px, 6.2vw, 34px);
      line-height: 1.0;
      margin-top: 2px;
    }
    .pct{
      text-align:center;
      font-weight: 950;
      font-size: clamp(44px, 12vw, 64px);
      letter-spacing: -.04em;
      color: var(--mint);
      text-shadow: 0 18px 48px rgba(0,255,209,.14);
      margin-top: -2px;
    }

    .previewBox{
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 22px;
      padding: 14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      min-height: 0;
    }
    .label{
      font-size: 12px;
      color: rgba(255,255,255,.72);
      letter-spacing:.01em;
    }
    .avatar{
      width: 84px; height: 84px;
      border-radius: 999px;
      border: 2px solid rgba(53,240,199,.35);
      box-shadow: 0 14px 45px rgba(0,0,0,.45);
      overflow:hidden;
      position:relative;
      background: rgba(255,255,255,.06);
    }
    canvas#pix{
      width:100%; height:100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display:block;
    }
    .nameMask{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      letter-spacing: .32em;
      font-size: 16px;
      color: rgba(255,255,255,.80);
      margin-top: -2px;
    }

    /* Hold button with ring */
    .holdWrap{
      width: min(260px, 82%);
      aspect-ratio: 1/1;
      border-radius: 999px;
      margin: 6px auto 2px;
      position:relative;
      display:grid;
      place-items:center;
      user-select:none;
      touch-action:none;
    }
    .holdBg{
      position:absolute; inset:0;
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.12), transparent 50%),
        rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: inset 0 0 0 7px rgba(255,255,255,.05), 0 24px 80px rgba(0,0,0,.55);
    }
    .holdText{
      position:relative;
      font-weight:900;
      letter-spacing:.18em;
      font-size: 16px;
      color: rgba(255,255,255,.80);
      text-transform:uppercase;
    }
    .ring{
      position:absolute; inset:-10px;
      pointer-events:none;
      transform: rotate(-90deg);
      opacity:.95;
    }
    .ring circle.bg{
      stroke: rgba(255,255,255,.10);
      stroke-width: 10;
      fill: transparent;
    }
    .ring circle.fg{
      stroke: rgba(53,240,199,.95);
      stroke-width: 10;
      fill: transparent;
      stroke-linecap: round;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      filter: drop-shadow(0 16px 26px rgba(0,255,209,.18));
    }

    .btn{
      width: 100%;
      border-radius: 18px;
      padding: 14px 14px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.90);
      user-select:none;
    }
    .btn:active{transform: scale(.99);}
    .btn.primary{
      background: linear-gradient(180deg, rgba(255,215,106,.98), rgba(255,199,60,.92));
      border-color: rgba(255,215,106,.45);
      color: rgba(15,18,28,.98);
    }
    .btnRow{display:flex; flex-direction:column; gap:10px; margin-top: 2px;}

    .chips{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top: 2px;
    }
    .chip{
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      font-size: 13px;
      color: rgba(255,255,255,.86);
      display:flex;
      align-items:center;
      gap:8px;
      user-select:none;
    }
    .chip:active{transform: scale(.99);}
    .tip{
      margin-top:auto;
      text-align:center;
      font-size: 12px;
      color: rgba(255,255,255,.45);
      line-height: 1.35;
      padding: 6px 6px 0;
    }
    .tiny{
      display:block;
      margin-top: 6px;
      color: rgba(53,240,199,.70);
      font-size: 12px;
      letter-spacing:.01em;
      min-height: 16px;
    }

    /* Small screens: avoid scroll */
    @media (max-height: 700px){
      .card{padding: 16px 14px 14px}
      .holdWrap{width: min(230px, 78%)}
      .avatar{width: 78px; height: 78px}
      .btn{padding: 12px 12px}
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="shell">

      <div class="top" aria-label="Header">
        <div class="orb" id="orb" aria-hidden="true">
          <div class="eyes" id="logoEyes" aria-hidden="true">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
          </div>
        </div>

        <div class="topText">
          <div class="brand">👀 someone you know picked you</div>
          <div class="sub">hold to reveal your vibe • fun mystery game</div>
        </div>

        <div class="pillRow">
          <div class="pill" id="nowPill" title="Fresh match">
            <span class="spark">✨</span> <span>now</span>
          </div>
          <button class="iconBtn" id="resetBtn" title="Reset">↻</button>
        </div>
      </div>

      <main class="card" role="main">
        <div>
          <div class="title">MATCH! 🔥</div>
          <div class="pct" id="pct">89%</div>
        </div>

        <section class="previewBox" aria-label="Sender preview">
          <div class="label">Sender preview:</div>
          <div class="avatar" aria-hidden="true">
            <canvas id="pix" width="24" height="24"></canvas>
          </div>
          <div class="nameMask" id="mask">L _ _ _ _</div>

          <div class="holdWrap" id="holdWrap" aria-label="Hold to reveal">
            <div class="holdBg"></div>
            <svg class="ring" viewBox="0 0 120 120" aria-hidden="true">
              <circle class="bg" cx="60" cy="60" r="52"></circle>
              <circle class="fg" id="ringFg" cx="60" cy="60" r="52"></circle>
            </svg>
            <div class="holdText" id="holdText">HOLD</div>
          </div>
        </section>

        <div class="btnRow">
          <button class="btn" id="shareBtn">SHARE TO DE‑PIXELATE</button>
          <button class="btn primary" id="seeBtn">SEE NAME NOW</button>
        </div>

        <div class="chips" aria-label="Reactions">
          <button class="chip" data-reaction="curious">👀 curious</button>
          <button class="chip" data-reaction="icebreaker">🧊 icebreaker</button>
          <button class="chip" data-reaction="plot">😳 plot twist</button>
          <button class="chip" data-reaction="message">💬 message</button>
          <button class="chip" data-reaction="bold">🔥 bold</button>
        </div>

        <div class="tip">
          Tip: Sharing unlocks the reveal faster.
          <span class="tiny" id="status"></span>
          <div style="margin-top:6px;">
            (This is a playful mystery experience — not a real identity claim.)
          </div>
        </div>
      </main>

    </div>
  </div>

<script>
(() => {
  // ---------- Helpers ----------
  const $ = (id) => document.getElementById(id);
  const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
  const vibrate = (pattern) => {
    try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e){}
  };

  // PWA: register SW
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    });
  }

  // ---------- State ----------
  const state = {
    pct: 89,
    shares: 0,
    sharesNeeded: 3,
    holdMsBase: 1200,
    holdMsMin: 650,
    holding: false,
    holdStart: 0,
    raf: 0,
    revealed: false,
    seed: Math.random() * 1e9
  };

  // ---------- UI ----------
  const pctEl = $('pct');
  const statusEl = $('status');
  const shareBtn = $('shareBtn');
  const seeBtn = $('seeBtn');
  const resetBtn = $('resetBtn');
  const holdWrap = $('holdWrap');
  const ringFg = $('ringFg');
  const holdText = $('holdText');
  const pix = $('pix');
  const ctx = pix.getContext('2d');
  const pupils = Array.from(document.querySelectorAll('.pupil'));

  // Ring setup
  const r = 52;
  const C = 2 * Math.PI * r;
  ringFg.style.strokeDasharray = C.toFixed(2);
  ringFg.style.strokeDashoffset = C.toFixed(2);

  function setRingProgress(p){
    const off = C * (1 - clamp(p, 0, 1));
    ringFg.style.strokeDashoffset = off.toFixed(2);
  }

  function updateStatus(){
    const left = Math.max(0, state.sharesNeeded - state.shares);
    if (state.revealed) {
      statusEl.textContent = "Unlocked.";
      return;
    }
    if (left === 0) {
      statusEl.textContent = "Sharing done — hold is faster now.";
    } else {
      statusEl.textContent = `Share ${left}× more for full clarity.`;
    }
  }

  function rand(){
    // deterministic-ish per session
    state.seed = (state.seed * 1664525 + 1013904223) % 4294967296;
    return state.seed / 4294967296;
  }

  function drawPixelFace(quality){
    // quality: 0..1 (0 = heavy pixelation)
    const base = 6 + Math.round(quality * 18); // 6..24
    pix.width = base;
    pix.height = base;

    // background gradient
    const g = ctx.createRadialGradient(base*0.35, base*0.35, 0, base*0.5, base*0.55, base*0.75);
    g.addColorStop(0, `rgba(${Math.floor(90+rand()*40)},${Math.floor(130+rand()*50)},${Math.floor(170+rand()*50)},1)`);
    g.addColorStop(1, `rgba(${Math.floor(20+rand()*25)},${Math.floor(30+rand()*25)},${Math.floor(50+rand()*35)},1)`);
    ctx.fillStyle = g;
    ctx.fillRect(0,0,base,base);

    // subtle highlight
    ctx.fillStyle = "rgba(255,255,255,.10)";
    ctx.beginPath();
    ctx.arc(base*0.35, base*0.32, base*0.20, 0, Math.PI*2);
    ctx.fill();

    // When unlocked, paint a crisp "face" hint (still anonymous)
    if (quality > 0.78) {
      ctx.fillStyle = "rgba(255,255,255,.20)";
      ctx.fillRect(base*0.22, base*0.62, base*0.56, base*0.07);
    }
  }

  function effectiveQuality(){
    // Each share increases quality; capped
    const q = clamp(state.shares / state.sharesNeeded, 0, 1);
    // Start slightly visible so it feels real
    return 0.18 + q * 0.82;
  }

  function updatePreview(){
    drawPixelFace(effectiveQuality());
  }

  function animatePupils(xNorm){
    // xNorm: 0..1
    const dx = (xNorm - 0.5) * 6; // px
    pupils.forEach((p,i) => {
      const wobble = (i? -1: 1) * 0.4;
      p.style.transform = `translate(${(-40 + dx + wobble)}%,-45%)`;
    });
  }

  // ---------- Actions ----------
  function resetAll(){
    state.pct = 84 + Math.floor(rand()*14);
    state.shares = 0;
    state.revealed = false;
    state.holding = false;
    cancelHold();
    pctEl.textContent = state.pct + "%";
    $('mask').textContent = "L _ _ _ _";
    holdText.textContent = "HOLD";
    seeBtn.disabled = false;
    updatePreview();
    updateStatus();
    // tiny ice branding pulse
    $('orb').animate([{transform:'scale(1)'},{transform:'scale(1.04)'},{transform:'scale(1)'}],{duration:520, easing:'cubic-bezier(.2,.8,.2,1)'});
    vibrate(10);
  }

  function holdDurationMs(){
    // each share reduces hold time (but never below min)
    const q = clamp(state.shares / state.sharesNeeded, 0, 1);
    const ms = state.holdMsBase - q * (state.holdMsBase - state.holdMsMin);
    return Math.round(ms);
  }

  function startHold(){
    if (state.revealed) return;
    if (state.holding) return;
    state.holding = true;
    state.holdStart = performance.now();
    holdText.textContent = "HOLDING";
    vibrate(12);

    const step = (t) => {
      if (!state.holding) return;
      const ms = holdDurationMs();
      const p = clamp((t - state.holdStart) / ms, 0, 1);
      setRingProgress(p);
      if (p >= 1) {
        finishReveal();
        return;
      }
      state.raf = requestAnimationFrame(step);
    };
    state.raf = requestAnimationFrame(step);
  }

  function cancelHold(){
    state.holding = false;
    holdText.textContent = state.revealed ? "DONE" : "HOLD";
    setRingProgress(0);
    if (state.raf) cancelAnimationFrame(state.raf);
  }

  function finishReveal(){
    state.holding = false;
    state.revealed = true;
    setRingProgress(1);
    holdText.textContent = "DONE";
    $('mask').textContent = "L I N A";
    drawPixelFace(1);
    updateStatus();
    vibrate([18, 30, 18]);

    // micro celebration
    document.querySelector('.card').animate(
      [{transform:'translateY(0)'},{transform:'translateY(-2px)'},{transform:'translateY(0)'}],
      {duration:420, easing:'cubic-bezier(.2,.8,.2,1)'}
    );
  }

  async function doShare(){
    if (state.revealed) return;
    // Always return control even if share is cancelled
    shareBtn.disabled = true;
    shareBtn.textContent = "OPENING SHARE…";
    const url = location.href;
    const shareData = {
      title: "👀 someone you know picked you",
      text: "I got a match — can you guess who? 🔥",
      url
    };

    let success = false;
    try{
      if (navigator.share) {
        // Race with timeout so we never “freeze”
        const res = await Promise.race([
          navigator.share(shareData).then(() => true).catch(() => false),
          new Promise(resolve => setTimeout(() => resolve(false), 8000))
        ]);
        success = !!res;
      } else {
        // Fallback: copy
        await navigator.clipboard.writeText(url);
        success = true;
      }
    }catch(e){
      success = false;
    }

    // If they opened share sheet, count it as intent (viral loop).
    // But don’t hard-block the user.
    state.shares = clamp(state.shares + 1, 0, state.sharesNeeded);
    updatePreview();
    updateStatus();
    vibrate(10);

    shareBtn.disabled = false;
    shareBtn.textContent = "SHARE TO DE‑PIXELATE";
    if (!success){
      // Nudge without trapping.
      statusEl.textContent = "Share cancelled — still counted as a try.";
    }
  }

  function seeNameNow(){
    if (state.revealed) return;
    // Soft gate: if not enough shares, we shorten hold instead of blocking
    if (state.shares < state.sharesNeeded){
      state.shares = state.sharesNeeded; // simulate “boost” for demo
      updatePreview();
      updateStatus();
      statusEl.textContent = "Boosted — hold is now instant-ish.";
      vibrate(10);
    }
    // quick hold animation
    startHold();
    setTimeout(() => { if (!state.revealed) finishReveal(); }, 420);
  }

  // Reactions (just a fun UX beat)
  function react(kind){
    vibrate(8);
    const map = {
      curious: "👀 curious",
      icebreaker: "🧊 icebreaker",
      plot: "😳 plot twist",
      message: "💬 message",
      bold: "🔥 bold"
    };
    statusEl.textContent = `Reaction sent: ${map[kind] || kind}`;
    // tiny eye wiggle
    const eyes = $('logoEyes');
    eyes.animate(
      [{transform:'translate(-50%,-45%) rotate(0deg)'},{transform:'translate(-50%,-45%) rotate(-5deg)'},{transform:'translate(-50%,-45%) rotate(0deg)'}],
      {duration:320, easing:'cubic-bezier(.2,.8,.2,1)'}
    );
  }

  // ---------- Events ----------
  // hold (touch + mouse)
  const startEvents = ['pointerdown'];
  const endEvents = ['pointerup','pointercancel','pointerleave'];
  startEvents.forEach(ev => holdWrap.addEventListener(ev, (e) => { e.preventDefault(); startHold(); }, {passive:false}));
  endEvents.forEach(ev => holdWrap.addEventListener(ev, (e) => { e.preventDefault(); cancelHold(); }, {passive:false}));

  shareBtn.addEventListener('click', doShare);
  seeBtn.addEventListener('click', seeNameNow);
  resetBtn.addEventListener('click', resetAll);

  document.querySelectorAll('.chip').forEach(ch => {
    ch.addEventListener('click', () => react(ch.dataset.reaction));
  });

  // parallax pupils based on pointer
  window.addEventListener('pointermove', (e) => {
    const xNorm = e.clientX / Math.max(1, window.innerWidth);
    animatePupils(xNorm);
  }, {passive:true});

  // first paint
  pctEl.textContent = state.pct + "%";
  updatePreview();
  updateStatus();
})();
</script>
</body>
</html>
